# Render Blueprint — deploys the Gravvia BACKEND: API (web) + workers (worker).
# The dashboard (@gravvia/dashboard) is deployed separately later.
#
# This is a native Node build (not Docker). The build runs from the repo root,
# so we use npm workspaces to build/start only @gravvia/backend.
#
# IMPORTANT:
#  - `--include=dev` is required: Render sets NODE_ENV=production, which makes
#    `npm install` skip devDependencies — including the @types/* needed by tsc.
#  - Node 22+ is required: @supabase/supabase-js needs native WebSocket, absent
#    in Node 20. NODE_VERSION pins it (the repo-root package.json has no engines).
#  - Secrets live in a shared env group (`gravvia-secrets`) so the web service
#    and the worker share ONE copy. Set the values once in the Render dashboard.

services:
  # ─── API (handles webhooks, custom functions, dashboard API) ────────────────
  - type: web
    name: gravvia-backend
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build --workspace=@gravvia/backend
    startCommand: npm run start --workspace=@gravvia/backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: gravvia-secrets
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: JWT_EXPIRES_IN
        value: 7d

  # ─── Workers (BullMQ: crm-sync, notifications, call/transcript, analytics,
  #     booking). Without this, queued jobs (post-call automations, CRM sync,
  #     confirmations) never run. Same build; only the start command differs. ──
  - type: worker
    name: gravvia-workers
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build --workspace=@gravvia/backend
    startCommand: npm run start:workers --workspace=@gravvia/backend
    autoDeploy: true
    envVars:
      - fromGroup: gravvia-secrets
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: JWT_EXPIRES_IN
        value: 7d

# ─────────────────────────────────────────────────────────────────────────────
# Shared secrets — set these ONCE in the Render dashboard (Env Groups →
# gravvia-secrets). Both services above reference this group via `fromGroup`.
# `sync: false` means Render prompts for the value and never stores it in git.
envVarGroups:
  - name: gravvia-secrets
    envVars:
      - key: JWT_SECRET
        sync: false
      # Public base URL Retell calls back into (events + custom functions).
      # MUST be the deployed API URL, e.g. https://inbound-va.onrender.com —
      # if unset/wrong, provisioning bakes placeholder URLs and calls 404.
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      # Upstash Redis connection string (redis:// or rediss://).
      - key: REDIS_URL
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_WEBHOOK_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # ---- Optional: email notifications (nodemailer). Set if used. ----
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
